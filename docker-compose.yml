version: '3.8'

# Bot saja yang jalan di VPS via Docker
# Dashboard → deploy ke Vercel (folder dashboard-vercel/)
# Database  → Firebase Firestore (cloud)

services:
  bot:
    build: .
    command: python main.py
    env_file: .env
    volumes:
      - ./credentials.json:/app/credentials.json:ro
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
      - ./bot:/app/bot:ro                                        # ← mount kode bot (hot-reload tanpa rebuild)
      - ./main.py:/app/main.py:ro                                # ← mount entrypoint
      - ./data:/app/data
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build: .
    command: uvicorn api_main:app --host 0.0.0.0 --port 8000
    env_file: .env
    volumes:
      - ./bot:/app/bot:ro
      - ./api_main.py:/app/api_main.py:ro
      - ./data:/app/data
    ports:
      - "8383:8000"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
